stages:
  - build
  - test

variables:
  NODE_OPTIONS: "--max_old_space_size=4096"

node_build:
  stage: build
  image: node:20-alpine
  cache:
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run build --if-present

node_test:
  stage: test
  image: node:20-alpine
  cache:
    paths:
      - node_modules/
  script:
    - npm test --if-present